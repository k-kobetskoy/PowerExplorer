<div>
  <a (click)="openDialog()" class="envName prevent-select">
    <div class="env-info">
      <p class="env-name">{{(activeEnvironment$| async).friendlyName}}</p>
      <p class="env-url small">{{(activeEnvironment$ |async).urlName}}</p>
    </div>
    <div class="chevron-container">      
      <tui-icon icon="@tui.chevrons-up-down" [style.font-size.rem]="1.5" class="settings-icon"></tui-icon>     
    </div>
  </a>
</div>
