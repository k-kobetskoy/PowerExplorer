<div>
  <a (click)="openDialog()" class="envName prevent-select">
    <div class="env-info">
      <h3>{{(activeEnvironment$| async).friendlyName}}</h3>
      <p class="small">{{(activeEnvironment$ |async).urlName}}</p>
    </div>
    <div class="chevron-container">
      <app-svg [icon]="chevronsUpDownIcon" [size]="'22'" [useStroke]="true" class="chevron-icon"></app-svg>
    </div>
  </a>
</div>
