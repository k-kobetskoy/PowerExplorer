<h2 class="tui-text_h2">{{context.data.title}}</h2>
<div class="tui-form__row">
  <p class="tui-text_body-l">{{context.data.message}}</p>
  <p *ngIf="context.data.details" class="tui-text_body-s error-details">{{context.data.details}}</p>
</div>
<div class="tui-form__buttons">
  <button tuiButton type="button" appearance="primary" (click)="close()">Close</button>
</div>
