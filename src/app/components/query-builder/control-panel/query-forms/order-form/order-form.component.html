<app-quick-actions [selectedNode]="selectedNode"></app-quick-actions>

<div class="form-container">
    <tui-combo-box
        [formControl]="attributeFormControl"
        class="tui-form__row">
        Attribute
        <tui-data-list-wrapper
            *tuiDataList
            [items]="filteredAttributes$ | async">
            <ng-template let-item>
                <div class="option-content">
                    <span class="logical-name">{{item.logicalName}}</span>
                    <span class="display-name">{{item.displayName}}</span>
                </div>
            </ng-template>
        </tui-data-list-wrapper>
    </tui-combo-box>
    <div class="tui-form__row">
        <app-loading-indicator [diameter]="20" loadingKey="attribute"></app-loading-indicator>
    </div>

    <tui-checkbox [formControl]="descendingFormControl">
        Descending Order
    </tui-checkbox>
</div>
