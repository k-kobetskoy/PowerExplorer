<app-quick-actions [selectedNode]="selectedNode"></app-quick-actions>

<div class="form-container">
    <form [formGroup]="attributeForm">
        <tui-combo-box
            formControlName="name"
            class="tui-form__row">
            Attribute
            <tui-data-list-wrapper
                *tuiDataList
                [items]="filteredAttributes$ | async">
                <ng-template let-item>
                    <div class="option-content">
                        <span class="logical-name">{{item.logicalName}}</span>
                        <span class="display-name">{{item.displayName}}</span>
                    </div>
                </ng-template>
            </tui-data-list-wrapper>
        </tui-combo-box>
        <div class="tui-form__row">
            <app-loading-indicator [diameter]="20"></app-loading-indicator>
        </div>

        <tui-input
            formControlName="alias"
            class="tui-form__row">
            Alias
        </tui-input>
    </form>
</div>
