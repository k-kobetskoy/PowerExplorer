<app-quick-actions [selectedNode]="selectedNode"></app-quick-actions>

<div class="form-container">
    <div class="form-field">
        <label for="top">Top</label>
        <input 
            id="top" 
            type="number" 
            class="form-input"
            [formControl]="topFormControl">
    </div>

    <div class="checkbox-group">
        <div class="checkbox-item">
            <input 
                id="distinct" 
                type="checkbox" 
                [formControl]="distinctFormControl">
            <label for="distinct">Distinct</label>
        </div>

        <div class="checkbox-item">
            <input 
                id="aggregate" 
                type="checkbox" 
                [formControl]="aggregateFormControl">
            <label for="aggregate">Aggregate</label>
        </div>

        <div class="checkbox-item">
            <input 
                id="total-records-count" 
                type="checkbox" 
                [formControl]="totalRecordsCountFormControl">
            <label for="total-records-count">Total record count</label>
        </div>

        <div class="checkbox-item">
            <input 
                id="late-materialize" 
                type="checkbox" 
                [formControl]="lateMaterializeFormControl">
            <label for="late-materialize">Late materialize</label>
        </div>
    </div>

    <div class="form-field">
        <label for="page-size">Page size</label>
        <input 
            id="page-size" 
            type="number" 
            class="form-input"
            [formControl]="recordsPerPageFormControl">
    </div>

    <div class="form-field">
        <label for="page">Page</label>
        <input 
            id="page" 
            type="number" 
            class="form-input"
            [formControl]="pageFormControl">
    </div>

    <div class="form-field">
        <label for="paging-cookie">Paging cookie</label>
        <input 
            id="paging-cookie" 
            type="text" 
            class="form-input"
            [formControl]="pagingCookieFormControl">
    </div>

    <div class="form-field">
        <label for="data-source">Data source</label>
        <select 
            id="data-source" 
            class="form-select"
            [formControl]="dataSourceFormControl">
            <option value="">Select data source</option>
            <option value="archive">Archive</option>
        </select>
    </div>
</div>
