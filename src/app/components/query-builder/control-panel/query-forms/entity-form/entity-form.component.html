<app-quick-actions [selectedNode]="selectedNode"></app-quick-actions>

<form [formGroup]="entityForm">
    <div class="form-field">
        <label for="entity-name">Name</label>
        <select id="entity-name" [formControl]="getFormControl(nameInputName)" class="form-control">
            <option value="">Select entity</option>
            <option *ngFor="let entity of filteredEntities$ | async" 
                [value]="entity.logicalName">
                {{entity.logicalName}} {{entity.displayName}}
            </option>
        </select>
    </div>
    
    <div class="tui-form__row">
        <app-loading-indicator [diameter]="20"></app-loading-indicator>
    </div>
</form>
