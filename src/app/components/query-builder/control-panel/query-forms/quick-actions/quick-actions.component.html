<div class="node-editor-container">
  <div class="tree-actions">
    <button tuiButton appearance="accent" size="s" (click)="deleteNode()">Delete</button>
  </div>
  <div class="quick-actions">
    <button tuiButton appearance="flat" size="s" *ngFor="let nodeName of getNodeActions()" (click)="addNode(nodeName)">{{nodeName}}</button>
  </div>
</div>
