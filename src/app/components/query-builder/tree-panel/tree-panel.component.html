<div class="tree-container">
  <!-- Tree content only -->
  <div class="tree">
    <div *ngFor="let node of dataSource$ | async">
      <div class="node-container" [style.padding-left.px]="node ? node.level * 20 : 0">
        <div *ngIf="node&&node.expandable&&node.visible">
          <div class="tree-node parent-node-element">
            <a (click)="toggleNode(node)">

              <tui-icon class="expand-icon" [class.collapsed]="!node.isExpanded" icon="@tui.chevron-down"
                [style.font-size.rem]="1"></tui-icon>

            </a>
            <div class="node-element-select-area" (click)="selectNode(node)"
              [ngClass]="{active: (this.selectedNode$ | async) ===node, inactive: (this.selectedNode$ | async)!==node}"
              [matTooltip]="(node.validationResult$|async)?.isValid === false ? ((node.validationResult$|async)?.errors || []).join('\n') : ''"
              [matTooltipDisabled]="(node.validationResult$|async)?.isValid !== false"
              matTooltipClass="validation-error-tooltip">
              <tui-icon [style.background]="'pink'" [style.color]="'purple'" class="tree-element-icon"
                *ngIf="getNodeIcon(node)"></tui-icon>
              <p class="small prevent-select">
                {{node.nodeDisplayValue$|async}}
              </p>
              <ng-container *ngIf="!(node.validationResult$|async)?.isValid">
                <img class="warning-icon" src="assets/icons/warning.svg" alt="warning">
              </ng-container>
            </div>
          </div>
        </div>

        <div *ngIf="node&&!node.expandable&&node.visible">
          <div class="tree-node">

            <tui-icon class="expand-icon-disabled" [style.font-size.rem]="1"></tui-icon>

            <div class="node-element-select-area" (click)="selectNode(node)"
              [ngClass]="{active: (this.selectedNode$ | async)===node, inactive: (this.selectedNode$ | async)!==node}"
              [matTooltip]="(node.validationResult$|async)?.isValid === false ? ((node.validationResult$|async)?.errors || []).join('\n') : ''"
              [matTooltipDisabled]="(node.validationResult$|async)?.isValid !== false"
              matTooltipClass="validation-error-tooltip">

              <ng-container *ngIf="getNodeIcon(node)">
                @switch(node.tagName) {
                @case('entity') {
                <img class="tree-element-icon" src="assets/icons/entity-icon.svg" alt="entity-icon">
                }
                @case('attribute') {
                <img class="tree-element-icon" src="assets/icons/attribute-icon.svg" alt="attribute-icon">
                }
                @case ('condition') {
                <img class="tree-element-icon" src="assets/icons/condition-icon.svg" alt="condition-icon">
                }
                @case ('filter') {
                <img class="tree-element-icon" src="assets/icons/filter-icon.svg" alt="filter-icon">
                }
                @case ('link') {
                <img class="tree-element-icon" src="assets/icons/link-icon.svg" alt="link-icon">
                }
                @case ('order') {
                <img class="tree-element-icon" src="assets/icons/order-icon.svg" alt="order-icon">
                }
                }
              </ng-container>
              <p class="small prevent-select">
                {{node.nodeDisplayValue$|async}}
              </p>
              <ng-container *ngIf="!(node.validationResult$|async)?.isValid">
                <img class="warning-icon" src="assets/icons/warning.svg" alt="warning">
              </ng-container>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
